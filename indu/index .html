<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Lopez</title>
<link rel="stylesheet" href="style.css">
<script src="scrips.js"></script>
</head>
<body>

<header>
  <h1>Tienda Lopez</h1>
  <input type="text" id="buscador" placeholder="Buscar ropa...">
  <button onclick="toggleCarrito()">🛒 <span id="contador">0</span></button>
</header>

<nav>
  <button onclick="filtrar('all')">Todo</button>
  <button onclick="filtrar('remera')">Remeras</button>
  <button onclick="filtrar('pantalon')">Pantalones</button>
</nav>

<section class="grid" id="productos"></section>

<div class="carrito" id="carrito">
  <h2>Tu compra</h2>
  <ul id="lista"></ul>
  <p id="total">Total: $0</p>
  <button onclick="finalizarCompra()">Finalizar compra</button>
</div>

<script src="script.js"></script>
</body>
</html>
